services:
  - type: web
    name: mindthegap-api
    runtime: python
    rootDir: src/backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: ENABLE_API_DOCS
        value: false
      - key: ENABLE_SEMANTIC_SEARCH
        value: false
      - key: CORS_ALLOW_ORIGINS
        value: https://mindthe-gap.netlify.app
      - key: RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 60
      - key: STATE_BENCHMARK_YEARS
        value: 2024,2023,2022
      - key: ADMIN_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: CENSUS_API_KEY
        sync: false
      - key: BLS_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: BEA_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
